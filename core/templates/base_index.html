<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .category-scroll::-webkit-scrollbar { display: none; }
        .product-card:active { transform: scale(0.98); }
        /* Estilo da animação do Toast */
        #toast-container div { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans" hx-boost="true">

    <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2 pointer-events-none"></div>

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-xl font-black text-gray-800 tracking-tighter italic">DELIVERY<span class="text-orange-500">PRO</span></h1>
                <p id="status-loja" class="text-[10px] font-bold uppercase tracking-widest"></p>
            </div>
            <button onclick="toggleCart()" class="relative p-2 bg-orange-100 text-orange-600 rounded-2xl">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>

        <div class="max-w-2xl mx-auto px-4 pb-3 overflow-x-auto category-scroll flex gap-4">
            <button onclick="filtrarCategoria('all', this)" class="categoria-btn whitespace-nowrap bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md shadow-orange-200">
                Início
            </button>

            {% for categoria in categorias %}
            <button onclick="filtrarCategoria('{{ categoria.id }}', this)" class="categoria-btn whitespace-nowrap bg-white text-gray-500 border border-gray-100 px-4 py-2 rounded-xl text-sm font-bold hover:bg-orange-50 transition-all">
                {{ categoria.nome_categoria }}
            </button>
            {% endfor %}
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-6 pb-24">
        {% block content %}{% endblock %}
    </main>

    <div id="cart-drawer" class="fixed inset-x-0 bottom-0 bg-white border-t rounded-t-[2.5rem] shadow-2xl z-[60] transform translate-y-full transition-transform duration-300 max-w-2xl mx-auto">
        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-gray-800 uppercase tracking-tighter">Meu Pedido</h2>
                <button onclick="toggleCart()" class="text-gray-400 text-2xl"><i class="fas fa-times"></i></button>
            </div>

            <div id="cart-items" class="space-y-4 mb-8 max-h-60 overflow-y-auto">
                <p class="text-center text-gray-400 italic py-4">Seu carrinho está vazio...</p>
            </div>

            <div class="border-t pt-4">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-500 font-bold uppercase text-xs">Total do Pedido</span>
                    <span id="cart-total" class="text-2xl font-black text-gray-800">R$ 0,00</span>
                </div>

                <div id="container-finalizar" class="space-y-3"></div>
            </div>
        </div>
    </div>

<script>
    // Variáveis Globais unificadas
    // Prioriza o que vem do servidor Django, se não existir, assume fechado
    let lojaAberta = {{ loja_aberta_server|yesno:"true,false" }};
    let carrinho = JSON.parse(localStorage.getItem('carrinho_delivery')) || [];

    // 1. Controle do Carrinho (UI)
    function atualizarCarrinhoUI() {
        const container = document.getElementById('cart-items');
        const totalEl = document.getElementById('cart-total');
        const countEl = document.getElementById('cart-count');

        if(countEl) countEl.innerText = carrinho.length;

        if (carrinho.length === 0) {
            if(container) container.innerHTML = '<p class="text-center text-gray-400 italic py-4">Seu carrinho está vazio...</p>';
            if(totalEl) totalEl.innerText = 'R$ 0,00';
            return;
        }

        if(container) {
            container.innerHTML = carrinho.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${item.nome}</p>
                        <p class="text-orange-500 font-black text-xs">R$ ${parseFloat(item.preco_unitario).toFixed(2)}</p>
                    </div>
                    <button onclick="removerItem(${index})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        const total = carrinho.reduce((sum, item) => sum + (parseFloat(item.preco_unitario) * item.quantidade), 0);
        if(totalEl) totalEl.innerText = `R$ ${total.toFixed(2)}`;
    }

    function removerItem(index) {
        carrinho.splice(index, 1);
        localStorage.setItem('carrinho_delivery', JSON.stringify(carrinho));
        atualizarCarrinhoUI();
    }

    function toggleCart() {
        const drawer = document.getElementById('cart-drawer');
        drawer.classList.toggle('translate-y-full');
    }

    // 2. Controle de Horário e Interface
    function atualizarInterfaceHorario() {
        const statusEl = document.getElementById("status-loja");
        const containerBtn = document.getElementById("container-finalizar");
        const botoesAdd = document.querySelectorAll(".btn-add");

        if (lojaAberta) {
            if(statusEl) {
                statusEl.className = "text-[11px] text-green-500 font-bold uppercase tracking-widest flex items-center gap-1 mt-1";
                statusEl.innerHTML = '<i class="fas fa-circle text-[8px] animate-pulse"></i> Aberto <span class="text-gray-400 normal-case tracking-normal ml-1">(até 16h)</span>';
            }
            if(containerBtn) {
                containerBtn.innerHTML = `
                    <button onclick="finalizarPedido('PIX')" class="w-full bg-blue-600 text-white py-4 rounded-[1.5rem] font-black uppercase shadow-lg shadow-blue-200 active:scale-95 transition-all">Pagar com PIX</button>
                    <button onclick="finalizarPedido('WHATSAPP')" class="w-full bg-green-500 text-white py-4 mt-3 rounded-[1.5rem] font-black uppercase shadow-lg shadow-green-200 active:scale-95 transition-all">Enviar WhatsApp</button>
                `;
            }
        } else {
            if(statusEl) {
                statusEl.className = "text-[11px] text-red-500 font-bold uppercase tracking-widest flex items-center gap-1 mt-1";
                statusEl.innerHTML = '<i class="fas fa-times-circle text-[10px]"></i> Fechado <span class="text-gray-400 normal-case tracking-normal ml-1">(Abre Seg às 11h)</span>';
            }
            if(containerBtn) {
                containerBtn.innerHTML = `<button onclick="mostrarModalLojaFechada()" class="w-full bg-gray-200 text-gray-400 py-4 rounded-[1.5rem] font-black uppercase cursor-not-allowed">Loja fechada</button>`;
            }
            botoesAdd.forEach(btn => {
                btn.classList.replace("bg-orange-500", "bg-gray-400");
                btn.classList.add("cursor-not-allowed");
            });
        }
    }

    function finalizarPedido(metodo) {
        if (!lojaAberta) return mostrarModalLojaFechada();
        if (carrinho.length === 0) return alert("Seu carrinho está vazio!");

        let msg = `*Novo Pedido (${metodo})*\n\n`;
        carrinho.forEach(item => {
            msg += `• ${item.nome} (R$ ${parseFloat(item.preco_unitario).toFixed(2)})\n`;
            if(item.adicionais && item.adicionais.length > 0) {
                item.adicionais.forEach(a => msg += `  + ${a.nome}\n`);
            }
        });

        const total = document.getElementById('cart-total').innerText;
        msg += `\n*Total: ${total}*`;
        const fone = "5511999999999"; // Ajuste seu número
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`);
    }

    function mostrarModalLojaFechada() {
        document.getElementById("modal-loja-fechada").classList.remove("hidden");
    }

    function fecharModalLoja() {
        document.getElementById("modal-loja-fechada").classList.add("hidden");
    }

    // Inicialização
    document.addEventListener("DOMContentLoaded", () => {
        atualizarInterfaceHorario();
        atualizarCarrinhoUI();
    });

    // Filtro por Categoria
function filtrarCategoria(id, btn) {
    // 1. Estética dos botões
    document.querySelectorAll('.categoria-btn').forEach(b => {
        b.classList.replace('bg-orange-500', 'bg-white');
        b.classList.replace('text-white', 'text-gray-500');
        b.classList.remove('shadow-md', 'shadow-orange-200');
    });
    btn.classList.replace('bg-white', 'bg-orange-500');
    btn.classList.replace('text-gray-500', 'text-white');
    btn.classList.add('shadow-md', 'shadow-orange-200');

    // 2. Lógica de visibilidade das SEÇÕES
    const secoes = document.querySelectorAll('.categoria-section');
    secoes.forEach(secao => {
        if (id === 'all' || secao.id === `cat-${id}`) {
            secao.style.display = 'block';
        } else {
            secao.style.display = 'none';
        }
    });

    // Se quiser que o scroll volte para o topo ao filtrar
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Filtro por Busca (Input)
function filtrar() {
    const termo = document.getElementById('searchUnificado').value.toLowerCase();
    const cards = document.querySelectorAll('.produto-card');

    cards.forEach(card => {
        const nome = card.getAttribute('data-name');
        const codigo = card.getAttribute('data-code');

        if (nome.includes(termo) || codigo.includes(termo)) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}


</script>
<div id="modal-loja-fechada"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-6 w-[320px] text-center">

        <h2 class="text-lg font-black text-red-500 mb-2">
            Loja Fechada
        </h2>

        <p class="text-gray-500 text-sm mb-4">

            Funcionamos de segunda a sábado<br>
            das 11h às 16h.

        </p>

        <button onclick="fecharModalLoja()"
        class="bg-orange-500 text-white px-6 py-2 rounded-xl">

            Ok

        </button>

    </div>

</div>
</body>
</html>
